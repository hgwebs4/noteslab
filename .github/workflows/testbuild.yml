name: Test Build (Fast)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Latest Checkout v4.2.2 (2026 stable)
    # submodules: 'recursive' is CRITICAL here
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0 # Full history kabhi-kabhi submodules ke liye zaruri hoti hai

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Rust Nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        toolchain: nightly
        targets: 'aarch64-linux-android'

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./noteslab-data-uniffi -> target"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # Debugging step: Isse pata chal jayega ki files wahan hain ya nahi
    - name: Verify Directory Structure
      run: |
        ls -R noteslab-data-uniffi/
        if [ ! -f "noteslab-data-uniffi/noteslab-data/Cargo.toml" ]; then
          echo "ERROR: noteslab-data/Cargo.toml not found!"
          exit 1
        fi

    - name: Build Rust (arm64)
      working-directory: ./noteslab-data-uniffi
      run: |
        chmod +x release.sh
        ./release.sh arm64-v8a

    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --parallel --no-daemon

    - name: Upload Test APK
      uses: actions/upload-artifact@v4
      with:
        name: NotesLab-Test-Build
        path: app/build/outputs/apk/debug/*.apk
        compression-level: 0
