name: Test Build (Fast)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.2.2
      with:
        submodules: 'recursive'
        fetch-depth: 1 

    - name: Set up JDK 21
      uses: actions/setup-java@v4.7.0
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Rust Nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        toolchain: nightly
        targets: 'aarch64-linux-android'

    - name: Rust Cache
      uses: swatinem/rust-cache@v2.7.5
      with:
        workspaces: "noteslab-data-uniffi -> target"
        shared-key: "noteslab-v2"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4.3.0

    # Ye step NDK ko dhund kar environment variables set karega
    - name: Setup Android NDK
      run: |
        # GitHub Runners par NDK default path yahi hota hai
        ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk-bundle
        if [ ! -d "$ANDROID_NDK_HOME" ]; then
          # Agar bundle nahi hai, toh latest version check karein
          ANDROID_NDK_HOME=$(ls -d $ANDROID_SDK_ROOT/ndk/* | tail -1)
        fi
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        # Rust linker ko batana ki clang kahan hai
        echo "PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH" >> $GITHUB_ENV

    - name: Fix Manifest Icon Error (Auto)
      run: |
        sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"/android:roundIcon="@mipmap\/ic_launcher"/g' app/src/main/AndroidManifest.xml

    - name: Build Rust Library (arm64)
      working-directory: ./noteslab-data-uniffi
      env:
        # Rust compiler ko linker ka sahi rasta dena
        CC_aarch64_linux_android: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang
        AR_aarch64_linux_android: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang
      run: cargo build --target aarch64-linux-android

    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --parallel --no-daemon --build-cache

    - name: Upload Test APK
      uses: actions/upload-artifact@v4.6.1
      with:
        name: NotesLab-Test-Build
        path: app/build/outputs/apk/debug/*.apk
        compression-level: 0
