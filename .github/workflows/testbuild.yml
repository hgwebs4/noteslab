name: Test Build (Fast)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Latest v4.x branch (Auto-updates to latest patch)
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1 

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Rust Nightly
      uses: dtolnay/rust-toolchain@nightly
      with:
        toolchain: nightly
        targets: 'aarch64-linux-android'

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./noteslab-data-uniffi -> target"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build Rust (arm64)
      working-directory: ./noteslab-data-uniffi
      run: |
        chmod +x release.sh
        ./release.sh arm64-v8a

    - name: Build Debug APK
      # assembleDebug release se kafi fast hota hai kyunki isme Proguard/R8 nahi chalta
      run: ./gradlew :app:assembleDebug --parallel --no-daemon

    - name: Upload Test APK
      uses: actions/upload-artifact@v4
      with:
        name: NotesLab-Test-Build
        path: app/build/outputs/apk/debug/*.apk
        compression-level: 0
